# render.yaml — Render Blueprint for The Fair Digest Backend
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: fair-digest-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false   # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set manually in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false   # Set manually in Render dashboard
      - key: NEWS_API_KEY
        sync: false   # Set manually in Render dashboard
      - key: CLIENT_URL
        sync: false   # Set to your Vercel frontend URL after deploying
